version: '3.9'

services:
  redis:
    image: redis:7-alpine
    container_name: sports-academy-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      target: production
    container_name: sports-academy-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    environment:
      PORT: 4000
      REDIS_URL: redis://redis:6379
      LOG_DIR: /app/logs
    depends_on:
      - redis
    volumes:
      - backend_logs:/app/logs

  notification-worker:
    build:
      context: ./backend
      target: production
    container_name: sports-academy-notification-worker
    restart: unless-stopped
    command: npm run worker:start
    env_file:
      - ./backend/.env.production
    environment:
      REDIS_URL: redis://redis:6379
      LOG_DIR: /app/logs
    depends_on:
      - redis
    volumes:
      - backend_logs:/app/logs

  frontend:
    build:
      context: ./frontend
      target: production
    container_name: sports-academy-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.production
    environment:
      NODE_ENV: production

  nginx:
    image: nginx:1.27-alpine
    container_name: sports-academy-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - '80:80'
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  redis_data:
  backend_logs:
